---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources the upstream Helm chart does not render:
#   * the CNPG Database CRD that creates the `umami` database in the shared
#     PostgreSQL cluster (the chart only consumes an external DB, it can't
#     create one),
#   * our Traefik IngressRoute with Authentik forward-auth (the chart's plain
#     Ingress is disabled in values.yaml).
resources:
  - postgresql-database.yaml
  - ingressroute.yaml
