---
# APP_SECRET signs Umami's auth tokens. 1Password vault `kubernetes`, item
# `umami-app`, field `credential` (generate: `openssl rand -base64 32`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-app-secret
  namespace: umami
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: umami-app-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        app_secret: "{{ .app_secret }}"
  data:
    - secretKey: app_secret
      remoteRef:
        key: umami-app
        property: credential
