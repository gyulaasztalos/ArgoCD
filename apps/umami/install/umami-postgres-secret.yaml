---
# Umami takes a single DATABASE_URL. Compose it in the app namespace from the
# CNPG role creds (the SAME 1Password item backs the CNPG-managed role, see the
# pre-install ExternalSecret in apps/cnpg/pre-install/).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-postgres-secret
  namespace: umami
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: umami-postgres-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        database_url: >-
          postgresql://{{ .username }}:{{ .password }}@postgres-rw.databases.svc.cluster.local:5432/umami
  data:
    - secretKey: username
      remoteRef:
        key: umami-postgres-password
        property: username
    - secretKey: password
      remoteRef:
        key: umami-postgres-password
        property: password
