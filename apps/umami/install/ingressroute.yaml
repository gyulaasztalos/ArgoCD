---
# Internal dashboard access, behind Authentik forward-auth (cluster standard for
# admin UIs). Public visitor tracking (script.js + /api/send) is exposed
# separately via the Cloudflare tunnel at stats.anitatortai.hu — see the
# cake-order tunnel config; that path is NOT behind Authentik (browsers of
# anonymous visitors must reach it), and Umami's own login protects the
# dashboard there.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: umami
  namespace: umami
  labels:
    app: umami
    app.kubernetes.io/name: umami
    app.kubernetes.io/part-of: umami
    app.kubernetes.io/instance: umami
    app.kubernetes.io/component: umami
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`umami.local.asztalos.net`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik
      services:
        - name: umami
          namespace: umami
          port: 80
  tls:
    secretName: local-asztalos-net-tls
