---
# Internal dashboard access, behind Authentik forward-auth (cluster standard for
# admin UIs). Umami's own login is disabled (DISABLE_LOGIN, see deployment) so
# Authentik is the ONLY thing guarding the dashboard on this route — keep it.
#
# Public visitor tracking (script.js + /api/send) is exposed separately via the
# Cloudflare tunnel at stats.anitatortai.hu so anonymous visitors' browsers can
# reach it. Because login is disabled, that public route MUST be path-restricted
# to the tracking endpoints only and MUST NOT reach the dashboard/management API.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: umami
  namespace: umami
  labels:
    app: umami
    app.kubernetes.io/name: umami
    app.kubernetes.io/part-of: umami
    app.kubernetes.io/instance: umami
    app.kubernetes.io/component: umami
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`umami.local.asztalos.net`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik
      services:
        - name: umami
          namespace: umami
          port: 80
  tls:
    secretName: local-asztalos-net-tls
