---
# Internal dashboard access, behind Authentik forward-auth (cluster standard for
# admin UIs). Umami also keeps its own login (see deployment note), so the
# dashboard is double-gated here.
#
# Public visitor tracking (script.js + /api/send) is exposed separately via the
# Cloudflare tunnel at stats.anitatortai.hu so anonymous visitors' browsers can
# reach it. Restrict that public route to the tracking endpoints as
# defence-in-depth; Umami's own login still guards the dashboard there.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: umami
  namespace: umami
  labels:
    app: umami
    app.kubernetes.io/name: umami
    app.kubernetes.io/part-of: umami
    app.kubernetes.io/instance: umami
    app.kubernetes.io/component: umami
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`umami.local.asztalos.net`)
      priority: 10
      middlewares:
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik
      services:
        - name: umami
          namespace: umami
          port: 80
  tls:
    secretName: local-asztalos-net-tls
