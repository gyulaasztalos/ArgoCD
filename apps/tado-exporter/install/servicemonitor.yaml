apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tado-exporter
  namespace: tado-exporter  # or the namespace where your exporter runs
  labels:
    release: prometheus-operator  # match your Prometheus Operator’s selector if needed
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tado-exporter  # or the label used by your exporter service
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: http
      honorLabels: true
  namespaceSelector:
    matchNames:
      - tado-exporter
