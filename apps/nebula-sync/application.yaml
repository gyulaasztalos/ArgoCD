---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nebula-sync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    # 1) this repo — provides the tailored valueFile (referenced as $config below)
    - repoURL: 'https://github.com/gyulaasztalos/ArgoCD.git'
      targetRevision: main
      ref: config
    # 2) the homelab-charts monorepo — the nebula-sync wrapper chart + the
    #    `common` library dependency (resolved from the same checkout). Renders
    #    the Deployment, its env ConfigMap and the ExternalSecret. No Service,
    #    IngressRoute or ServiceMonitor — it is a headless cron worker.
    - repoURL: 'https://github.com/gyulaasztalos/homelab-charts.git'
      targetRevision: main
      path: charts/nebula-sync
      helm:
        valueFiles:
          - $config/apps/nebula-sync/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nebula-sync
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
