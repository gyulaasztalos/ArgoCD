---
# This StorageClass is used for frequently changing volumes where the content is not so important (Prometheus metrics).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-temp-1r
provisioner: driver.longhorn.io
parameters:
  backupTargetName: default
  dataEngine: v1
  dataLocality: best-effort
  disableRevisionCounter: 'true'
  fromBackup: ''
  fsType: ext4
  numberOfReplicas: '1'
  staleReplicaTimeout: '30'
  unmapMarkSnapChainRemoved: ignored
  recurringJobSelector: '[{"name":"temp-1r", "isGroup":true }]'
  snapshotMaxCount: '4'
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
