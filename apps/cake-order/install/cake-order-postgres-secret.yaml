---
# DB role credentials for the app, synced from 1Password into the app namespace.
# The SAME 1Password item also backs the CNPG-managed role (see the pre-install
# ExternalSecret in apps/cnpg/pre-install/), so app and DB share one credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cake-order-postgres-secret
  namespace: cake-order
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: cake-order-postgres-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: cake-order-postgres-password
        property: username
    - secretKey: password
      remoteRef:
        key: cake-order-postgres-password
        property: password
