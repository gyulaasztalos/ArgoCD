---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cake-order
  namespace: cake-order
  labels:
    app: cake-order
    app.kubernetes.io/name: cake-order
    app.kubernetes.io/part-of: cake-order
    app.kubernetes.io/instance: cake-order
    app.kubernetes.io/component: cake-order
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`order.local.asztalos.net`)
      priority: 10
      middlewares:
        # PUBLIC app — deliberately NO authentik middleware (unlike the internal
        # cake-pricing). Abuse control lives in the app (honeypot, rate limits,
        # e-mail verification). Keep the hardened default headers.
        - name: default-headers
          namespace: traefik
      services:
        - name: cake-order
          namespace: cake-order
          port: 80
  tls:
    secretName: local-asztalos-net-tls
