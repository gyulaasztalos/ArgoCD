---
# App secrets from 1Password (vault `kubernetes`, EXISTING item `email-credentials`):
#   username / password  — iCloud SMTP credentials (app-specific password)
#   rate_hash_salt       — salt for hashed rate-limit keys + the form HMAC
#                          (user adds this third field; generate with
#                           `openssl rand -base64 32`)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cake-order-app-secret
  namespace: cake-order
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: cake-order-app-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        smtp_user: "{{ .smtp_user }}"
        smtp_password: "{{ .smtp_password }}"
        rate_hash_salt: "{{ .rate_hash_salt }}"
  data:
    - secretKey: smtp_user
      remoteRef:
        key: email-credentials
        property: username
    - secretKey: smtp_password
      remoteRef:
        key: email-credentials
        property: password
    - secretKey: rate_hash_salt
      remoteRef:
        key: email-credentials
        property: rate_hash_salt
