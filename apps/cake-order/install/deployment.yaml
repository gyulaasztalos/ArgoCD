---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cake-order
  namespace: cake-order
  labels:
    app: cake-order
    app.kubernetes.io/name: cake-order
    app.kubernetes.io/part-of: cake-order
    app.kubernetes.io/instance: cake-order
    app.kubernetes.io/component: cake-order
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cake-order
  template:
    metadata:
      labels:
        app: cake-order
        app.kubernetes.io/name: cake-order
        app.kubernetes.io/part-of: cake-order
        app.kubernetes.io/instance: cake-order
        app.kubernetes.io/component: cake-order
    spec:
      initContainers:
        # Copy the gallery photos off the NFS mount into a pod-local emptyDir
        # ONCE at startup, so the app serves them from local SSD and never
        # touches NFS at request time (a hung NAS can't affect the running app).
        # It then renames each photo to its CAPTURE DATE (EXIF DateTimeOriginal)
        # as YYYYMMDDHHMM.<ext>, so a plain filename sort is truly chronological
        # — the app's "newest first" ordering (and the hero pick) no longer rely
        # on the camera's IMG_#### counter.
        # Finally it downscales each cakes/desserts photo into a thumbs/ subdir
        # — the grid loads the small thumbnail, the lightbox the full image.
        # `hero/` (homepage backdrop) is renamed too but needs no thumbnail.
        # Renaming happens BEFORE thumbnailing so thumbs/<name> matches its full
        # image. Only the pod-local copy is renamed; NAS originals are untouched.
        # New photos on the NAS appear after a pod restart/rollout.
        - name: prepare-gallery
          # ImageMagick (multi-arch: amd64 + arm64 for rPi5) — busybox-based, so
          # it still has sh/cp/find, and `identify` reads the EXIF date.
          # renovate: managed image tag.
          image: minidocks/imagemagick:7
          command:
            - sh
            - -c
            - |
              set -u
              for KIND in cakes desserts hero
              do
                mkdir -p "/local/${KIND}"
                cp -a "/nfs/${KIND}/." "/local/${KIND}/" 2>/dev/null || true
              done
              # Rename to the capture date. Fallback chain: EXIF DateTimeOriginal
              # -> EXIF DateTime -> file mtime -> keep the original name (never
              # drop a photo). Same-minute shots get a -2/-3 suffix so a
              # collision can never silently overwrite another photo.
              for KIND in cakes desserts hero
              do
                find "/local/${KIND}" -maxdepth 1 -type f \
                  \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
                  | while IFS= read -r FILE
                    do
                      # get the extension in lowercase, so .JPG and .jpg are treated the same
                      EXT=$(printf '%s' "${FILE##*.}" | tr 'A-Z' 'a-z')
                      # get the capture date from EXIF
                      CAPTURE_DATE=$(identify -format '%[EXIF:DateTimeOriginal]' "${FILE}" 2>/dev/null)
                      [ -n "$CAPTURE_DATE" ] || CAPTURE_DATE=$(identify -format '%[EXIF:DateTime]' "${FILE}" 2>/dev/null)
                      # create a 12-digit timestamp from the capture date
                      STAMP=$(printf '%s' "$CAPTURE_DATE" | tr -cd '0-9' | cut -c1-12)
                      # If timestamp is not 12 digits, fallback to file mtime.
                      [ ${#STAMP} -eq 12 ] || STAMP=$(date -r "${FILE}" +%Y%m%d%H%M 2>/dev/null)
                      # If timestamp is still not 12 digits, skip renaming this file.
                      [ ${#STAMP} -eq 12 ] || continue
                      TARGET="/local/${KIND}/${STAMP}.${EXT}"
                      # If a file with the same timestamp already exists, append a suffix to avoid overwriting.
                      n=2
                      while [ -e "${TARGET}" ] && [ "${TARGET}" != "${FILE}" ]
                      do
                        TARGET="/local/${KIND}/${STAMP}-$n.${EXT}"
                        n=$((n + 1))
                      done
                      # when the first available suffix is found, rename the file to the target name (if it's not already the same)
                      if [ "${TARGET}" != "${FILE}" ]
                      then
                        mv "${FILE}" "${TARGET}"
                      fi
                    done
              done
              for KIND in cakes desserts
              do
                mkdir -p "/local/${KIND}/thumbs"
                find "/local/${KIND}" -maxdepth 1 -type f \
                  \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
                  | while IFS= read -r FILE
                    do
                      convert "${FILE}" -auto-orient -thumbnail '600x600^' -gravity center \
                        -extent 600x600 -quality 82 "/local/${KIND}/thumbs/$(basename "${FILE}")" \
                        2>/dev/null || true
                    done
              done
              true
          securityContext:
            # ImageMagick needs a writable /tmp for its temp files.
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: gallery-nfs
              mountPath: /nfs
              readOnly: true
            - name: gallery-local
              mountPath: /local
      containers:
        - name: cake-order
          # renovate: managed image tag — Renovate bumps this on new semver releases
          image: asztalosgyula/cake-order:1.1.3
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            privileged: false
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_ENV
              value: prod
            # Public base URL — verification links are built from this.
            # Dev phase: order.local.asztalos.net; flips to https://anitatortai.hu at go-live.
            - name: BASE_URL
            #  value: https://anitatortai.hu
              value: https://order.local.asztalos.net
            # Public hostnames (apex + www) — /metrics is 404'd for these so the
            # tunnel can't expose Prometheus data. Add the dev host too so the
            # gate behaves the same behind the internal Traefik route.
            - name: PUBLIC_HOSTS
              value: anitatortai.hu,www.anitatortai.hu,order.local.asztalos.net
            - name: ENABLED_LOCALES
              value: hu,en
            # DB connection: assembled from the CNPG-managed role secret.
            - name: DB_HOST
              value: postgres-rw.databases.svc.cluster.local
            - name: DB_NAME
              value: cake-order
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cake-order-postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cake-order-postgres-secret
                  key: password
            # E-mail via iCloud Mail (custom domain anitatortai.hu behind it).
            # iCloud requires STARTTLS on 587 and an app-specific password.
            - name: SMTP_HOST
              value: smtp.mail.me.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURITY
              value: starttls
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: smtp_user
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: smtp_password
            # iCloud only lets you send as the account address or a configured
            # alias of the custom domain — info@ is the safe choice.
            - name: MAIL_FROM
              value: info@anitatortai.hu
            - name: ORDER_INBOX
              value: info@anitatortai.hu
            - name: RATE_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: rate_hash_salt
            # Phase 2: forward confirmed offer requests to cake-pricing as
            # external draft offers. In-cluster ClusterIP call — no ingress,
            # no Authentik; the bearer token is still required (§8a).
            - name: BACKEND_ENABLED
              value: "true"
            - name: BACKEND_URL
              value: http://cake-pricing.cake-pricing.svc.cluster.local
            - name: BACKEND_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: intake_token
            # Internal cake-pricing UI URL — used only to build the chef's
            # "open the draft" link in the order e-mail.
            - name: PRICING_BASE_URL
              value: https://torta.local.asztalos.net
            # Cookieless self-hosted analytics (Umami). Tracking activates ONLY
            # when both are non-empty; ANALYTICS_WEBSITE_ID is generated in the
            # Umami dashboard after first login, so it starts empty (analytics
            # off) until the site is created there and this is filled in.
            - name: ANALYTICS_SRC
            #  value: https://stats.anitatortai.hu/script.js
              value: https://umami.local.asztalos.net/script.js
            - name: ANALYTICS_WEBSITE_ID
              value: "eee307fe-35fe-481a-be39-a443c416ea6d"
          volumeMounts:
            # Local copy of the NAS photos (populated by the initContainer)
            # overlays the two gallery dirs; the baked-in placeholder SVGs in
            # gallery/ itself stay visible for empty galleries.
            - name: gallery-local
              mountPath: /app/app/static/img/gallery/cakes
              subPath: cakes
              readOnly: true
            - name: gallery-local
              mountPath: /app/app/static/img/gallery/desserts
              subPath: desserts
              readOnly: true
            - name: gallery-local
              mountPath: /app/app/static/img/gallery/hero
              subPath: hero
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 5
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 5
      volumes:
        # NFS source (read-only) — mounted ONLY in the copy-gallery initContainer.
        - name: gallery-nfs
          persistentVolumeClaim:
            claimName: cake-order-gallery
        # Pod-local copy the app actually serves from (node SSD, not memory).
        - name: gallery-local
          emptyDir: {}
      restartPolicy: Always
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
