---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cake-order
  namespace: cake-order
  labels:
    app: cake-order
    app.kubernetes.io/name: cake-order
    app.kubernetes.io/part-of: cake-order
    app.kubernetes.io/instance: cake-order
    app.kubernetes.io/component: cake-order
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cake-order
  template:
    metadata:
      labels:
        app: cake-order
        app.kubernetes.io/name: cake-order
        app.kubernetes.io/part-of: cake-order
        app.kubernetes.io/instance: cake-order
        app.kubernetes.io/component: cake-order
    spec:
      initContainers:
        # Copy the gallery photos off the NFS mount into a pod-local emptyDir
        # ONCE at startup, so the app serves them from local SSD and never
        # touches NFS at request time (a hung NAS can't affect the running app).
        # The SAME step downscales each cakes/desserts photo into a thumbs/
        # subdir — the grid loads the small thumbnail, the lightbox the full
        # image. `hero/` (homepage backdrop) is copied as-is, no thumbnail.
        # New photos on the NAS appear after a pod restart/rollout.
        - name: prepare-gallery
          # ImageMagick (multi-arch: amd64 + arm64 for rPi5) — busybox-based, so
          # it still has sh/cp/find. renovate: managed image tag.
          image: minidocks/imagemagick:7
          command:
            - sh
            - -c
            - |
              set -u
              for kind in cakes desserts hero; do
                mkdir -p "/local/$kind"
                cp -a "/nfs/$kind/." "/local/$kind/" 2>/dev/null || true
              done
              for kind in cakes desserts; do
                mkdir -p "/local/$kind/thumbs"
                find "/local/$kind" -maxdepth 1 -type f \
                  \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
                  | while IFS= read -r f; do
                      convert "$f" -auto-orient -thumbnail '600x600^' -gravity center \
                        -extent 600x600 -quality 82 "/local/$kind/thumbs/$(basename "$f")" \
                        2>/dev/null || true
                    done
              done
              true
          securityContext:
            # ImageMagick needs a writable /tmp for its temp files.
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: gallery-nfs
              mountPath: /nfs
              readOnly: true
            - name: gallery-local
              mountPath: /local
      containers:
        - name: cake-order
          # renovate: managed image tag — Renovate bumps this on new semver releases
          image: asztalosgyula/cake-order:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            privileged: false
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_ENV
              value: prod
            # Public base URL — verification links are built from this.
            # Dev phase: order.local.asztalos.net; flips to https://anitatortai.hu at go-live.
            - name: BASE_URL
              value: https://anitatortai.hu
            # Public hostnames (apex + www) — /metrics is 404'd for these so the
            # tunnel can't expose Prometheus data. Add the dev host too so the
            # gate behaves the same behind the internal Traefik route.
            - name: PUBLIC_HOSTS
              value: anitatortai.hu,www.anitatortai.hu,order.local.asztalos.net
            - name: ENABLED_LOCALES
              value: hu,en
            # DB connection: assembled from the CNPG-managed role secret.
            - name: DB_HOST
              value: postgres-rw.databases.svc.cluster.local
            - name: DB_NAME
              value: cake-order
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cake-order-postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cake-order-postgres-secret
                  key: password
            # E-mail via iCloud Mail (custom domain anitatortai.hu behind it).
            # iCloud requires STARTTLS on 587 and an app-specific password.
            - name: SMTP_HOST
              value: smtp.mail.me.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURITY
              value: starttls
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: smtp_user
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: smtp_password
            # iCloud only lets you send as the account address or a configured
            # alias of the custom domain — info@ is the safe choice.
            - name: MAIL_FROM
              value: info@anitatortai.hu
            - name: ORDER_INBOX
              value: info@anitatortai.hu
            - name: RATE_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: rate_hash_salt
            # Phase 2: forward confirmed offer requests to cake-pricing as
            # external draft offers. In-cluster ClusterIP call — no ingress,
            # no Authentik; the bearer token is still required (§8a).
            - name: BACKEND_ENABLED
              value: "true"
            - name: BACKEND_URL
              value: http://cake-pricing.cake-pricing.svc.cluster.local
            - name: BACKEND_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cake-order-app-secret
                  key: intake_token
            # Internal cake-pricing UI URL — used only to build the chef's
            # "open the draft" link in the order e-mail.
            - name: PRICING_BASE_URL
              value: https://torta.local.asztalos.net
            # Cookieless self-hosted analytics (Umami). Tracking activates ONLY
            # when both are non-empty; ANALYTICS_WEBSITE_ID is generated in the
            # Umami dashboard after first login, so it starts empty (analytics
            # off) until the site is created there and this is filled in.
            - name: ANALYTICS_SRC
              value: https://stats.anitatortai.hu/script.js
            - name: ANALYTICS_WEBSITE_ID
              value: "eee307fe-35fe-481a-be39-a443c416ea6d"
          volumeMounts:
            # Local copy of the NAS photos (populated by the initContainer)
            # overlays the two gallery dirs; the baked-in placeholder SVGs in
            # gallery/ itself stay visible for empty galleries.
            - name: gallery-local
              mountPath: /app/app/static/img/gallery/cakes
              subPath: cakes
              readOnly: true
            - name: gallery-local
              mountPath: /app/app/static/img/gallery/desserts
              subPath: desserts
              readOnly: true
            - name: gallery-local
              mountPath: /app/app/static/img/gallery/hero
              subPath: hero
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 5
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 5
      volumes:
        # NFS source (read-only) — mounted ONLY in the copy-gallery initContainer.
        - name: gallery-nfs
          persistentVolumeClaim:
            claimName: cake-order-gallery
        # Pod-local copy the app actually serves from (node SSD, not memory).
        - name: gallery-local
          emptyDir: {}
      restartPolicy: Always
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
