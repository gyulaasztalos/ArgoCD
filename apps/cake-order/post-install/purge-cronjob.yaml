---
# GDPR retention job (cake-order PLANNING §3.5): purges unverified orders
# after 48h, completed orders after 30 days, and stale rate-limit events.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cake-order-purge
  namespace: cake-order
  annotations:
    # The jobTemplate deliberately sets ttlSecondsAfterFinished (auto-clean
    # finished purge jobs); the history limits are also set intentionally. The
    # interaction is understood and wanted, so waive kube-linter's warning.
    ignore-check.kube-linter.io/job-ttl-seconds-after-finished: "Intentional: ttlSecondsAfterFinished plus successful/failedJobsHistoryLimit are both set on purpose."
  labels:
    app: cake-order
    app.kubernetes.io/name: cake-order
    app.kubernetes.io/part-of: cake-order
    app.kubernetes.io/instance: cake-order
    app.kubernetes.io/component: cake-order-purge
spec:
  schedule: "20 3 * * *"
  timeZone: Europe/Budapest
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: cake-order
            app.kubernetes.io/name: cake-order
        spec:
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            fsGroup: 1000
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          containers:
            - name: purge
              # renovate: managed image tag — kept in lockstep with deployment.yaml
              image: asztalosgyula/cake-order:1.1.3
              command: ["python", "-m", "app.jobs.purge"]
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                privileged: false
              # Resource requests/limits (kube-linter unset-cpu/memory). A light
              # nightly GDPR purge — modest, with a generous ceiling.
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              env:
                - name: DB_HOST
                  value: postgres-rw.databases.svc.cluster.local
                - name: DB_NAME
                  value: cake-order
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: cake-order-postgres-secret
                      key: username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: cake-order-postgres-secret
                      key: password
