apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpoller-exporter
  namespace: unpoller  # or the namespace where your exporter runs
  labels:
    release: prometheus-operator  # match your Prometheus Operator’s selector if needed
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller  # or the label used by your exporter service
  endpoints:
    - path: /metrics
      interval: 60s      # unpoller background-refreshes controller data every 60s (v3.2+); faster scrapes only re-read cached values
      targetPort: http
      honorLabels: true
  namespaceSelector:
    matchNames:
      - unpoller
