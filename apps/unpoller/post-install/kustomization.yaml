---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Auxiliary observability assets kept OUT of the Helm chart, synced as a separate
# ArgoCD Application source alongside it (see homelab-charts/PLAN.md "Scope
# boundary"):
#
#   - six Grafana dashboards (labelled grafana_dashboard: "1", discovered by the
#     kube-prometheus-stack sidecar in any namespace). These are large JSON blobs
#     — ~1.2 MB total — which is exactly why they do not belong in values.yaml.
#   - prometheus-alarms.yaml, the unpoller PrometheusRule.
#
# The configMapGenerator hashes each dashboard's name. That is fine here: nothing
# in the Helm chart references these ConfigMaps by name (the Grafana sidecar finds
# them by label), so — unlike homepage's images — no disableNameSuffixHash is
# needed.
configMapGenerator:
  - name: unpoller-uap-insights-dashboard
    namespace: unpoller
    files:
      - unpoller-uap-insights.json=unpoller-uap-insights.json
  - name: unpoller-client-insights-dashboard
    namespace: unpoller
    files:
      - unpoller-client-insights.json=unpoller-client-insights.json
  - name: unpoller-client-dpi-dashboard
    namespace: unpoller
    files:
      - unpoller-client-dpi.json=unpoller-client-dpi.json
  - name: unpoller-usw-insights-dashboard
    namespace: unpoller
    files:
      - unpoller-usw-insights.json=unpoller-usw-insights.json
  - name: unpoller-network-sites-dashboard
    namespace: unpoller
    files:
      - unpoller-network-sites.json=unpoller-network-sites.json
  - name: unpoller-usg-insights-dashboard
    namespace: unpoller
    files:
      - unpoller-usg-insights.json=unpoller-usg-insights.json

resources:
  - prometheus-alarms.yaml

generatorOptions:
  labels:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/instance: unpoller
    app.kubernetes.io/part-of: unpoller
    app.kubernetes.io/component: unpoller
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "/tmp/dashboards/Tools"
