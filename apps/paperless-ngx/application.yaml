---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-ngx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    # 1) this repo — provides the tailored valueFile (referenced as $config below)
    - repoURL: 'https://github.com/gyulaasztalos/ArgoCD.git'
      targetRevision: main
      ref: config
    # 2) the homelab-charts monorepo — the paperless-ngx wrapper chart + `common`.
    #    CORE workload: the StatefulSet (RWO data volumeClaimTemplate + static NFS
    #    consume/export PV/PVC), the config + notification ConfigMaps, the four
    #    ExternalSecrets, the Service and the IngressRoute. Deployment -> StatefulSet
    #    cutover: see MIGRATION-statefulset.md (Longhorn clone of the data volume).
    - repoURL: 'https://github.com/gyulaasztalos/homelab-charts.git'
      targetRevision: main
      path: charts/paperless-ngx
      helm:
        valueFiles:
          - $config/apps/paperless-ngx/values.yaml
    # 3) the two resources common does not model: the CNPG Database and the
    #    paperless-ngx-headers Traefik Middleware
    - repoURL: 'https://github.com/gyulaasztalos/ArgoCD.git'
      targetRevision: main
      path: apps/paperless-ngx/post-install
  destination:
    server: https://kubernetes.default.svc
    namespace: paperless-ngx
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
