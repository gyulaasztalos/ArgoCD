---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flexget
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    # 1) this repo — provides the tailored valueFile (referenced as $config below)
    - repoURL: 'https://github.com/gyulaasztalos/ArgoCD.git'
      targetRevision: main
      ref: config
    # 2) the homelab-charts monorepo — the flexget wrapper chart + the `common`
    #    library dependency (resolved from the same checkout). Renders the
    #    StatefulSet (RWO config volume via volumeClaimTemplate), its config
    #    ConfigMap, the ExternalSecret, the Service and the IngressRoute.
    #    Deployment -> StatefulSet cutover: see MIGRATION-statefulset.md.
    - repoURL: 'https://github.com/gyulaasztalos/homelab-charts.git'
      targetRevision: main
      path: charts/flexget
      helm:
        valueFiles:
          - $config/apps/flexget/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: flexget
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
