# Complete UniFi Router manifest using TraefikService CRD (NO EndpointSlices)
# Deploy with: kubectl apply -f unifi-traefikservice.yaml -n traefik

---
# 1. ServersTransport (self-signed cert bypass)
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: unifi-servers-transport
  namespace: traefik
spec:
  insecureSkipVerify: true

---
# 2. TraefikService (direct external IPv6 - NO Kubernetes Service needed)
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: unifi-router-service
  namespace: traefik
spec:
  loadBalancer:
    servers:
    - url: "https://[fdbf:c39a:a943:50::]:443"

---
# 3. IngressRoute (references TraefikService directly)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: unifi
  namespace: traefik
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`unifi.local.asztalos.net`)
    kind: Rule
    middlewares:
    - name: default-headers  # Your default-headers equivalent
    services:
    - name: unifi-router-service
      kind: TraefikService
      serversTransport: unifi-servers-transport  # Self-signed handling
  tls:
    secretName: local-asztalos-net-tls  # Wildcard cert

