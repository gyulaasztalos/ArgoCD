# =============================================================================
# netatmo-exporter — TAILORED deployment values (this GitOps repo)
# Consumed by the ArgoCD Application (see application.yaml) as a Helm valueFile
# layered over the generic homelab-charts/charts/netatmo-exporter chart.
#
# This file is the COMPLETE, reviewable contract for the live deployment: real
# hostnames + secret refs AND all unchanged defaults, so the whole configuration
# is visible in one place. The chart's own values.yaml holds only generic
# example.com placeholders.
#
# NOTE: the Grafana dashboard that used to live in install/ has been relocated
# to apps/netatmo-exporter/post-install/ (synced as a separate ArgoCD source);
# it is NOT part of this chart. See homelab-charts/PLAN.md "Scope boundary".
# =============================================================================

name: netatmo-exporter
namespace: netatmo-exporter

# -----------------------------------------------------------------------------
# Container image. image.tag is the single source of truth for the app version.
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/xperimental/netatmo-exporter
  # renovate: datasource=docker depName=ghcr.io/xperimental/netatmo-exporter
  tag: "2.1.2"
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Controller. StatefulSet — owns a writable RWO config volume (token cache).
# The cached token is regenerable (init container re-seeds it), so migration is
# delete-and-recreate.
# -----------------------------------------------------------------------------
controller:
  type: statefulset
  replicas: 1
  revisionHistoryLimit: 2
  updateStrategy:
    type: RollingUpdate

# Per-replica RWO volume (→ config-netatmo-exporter-0), mounted at /config.
volumeClaimTemplates:
  - metadata:
      name: config
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      resources:
        requests:
          storage: 10Mi

# -----------------------------------------------------------------------------
# ServiceAccount. This app never calls the Kubernetes API, so it runs under the
# namespace's `default` ServiceAccount and the chart creates nothing.
#
# Full knob set (common >= 0.2.0), for when an app DOES need its own identity:
#   create: true         render a ServiceAccount, named after the app
#   name: <app>          override that name
#   annotations: {}      e.g. cloud IAM role bindings
#   secrets: []          the SA's own `secrets:` back-reference
#   tokenSecret:
#     create: true       emit a LONG-LIVED kubernetes.io/service-account-token
#                        Secret — Kubernetes >= 1.24 no longer auto-creates one,
#                        so an app needing a durable API token must ask for it.
#                        Rendered EMPTY: the template has no data/stringData
#                        field at all, and kube-controller-manager populates the
#                        token in-cluster, so no secret material enters the repo.
#     name: <app>        defaults to the ServiceAccount name
# Also set the top-level `serviceAccountName` so the pod actually uses it.
# See charts/homepage for a worked example (its `kubernetes` widget needs one).
# -----------------------------------------------------------------------------
serviceAccount:
  create: false
  secrets: []
  tokenSecret:
    create: false

# -----------------------------------------------------------------------------
# Security — homelab standard, fully non-root.
# -----------------------------------------------------------------------------
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  privileged: false

podAntiAffinity: true

# -----------------------------------------------------------------------------
# Ports.
# -----------------------------------------------------------------------------
ports:
  - name: http
    containerPort: 9210

# -----------------------------------------------------------------------------
# Configuration — non-secret env via generated ConfigMap; OAuth client id/secret
# injected as individual env from the ExternalSecret-created Secret.
# -----------------------------------------------------------------------------
envFromConfigMap: netatmo-exporter-config
envFromSecrets: []
env:
  - name: NETATMO_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: netatmo-exporter-secret
        key: NETATMO_CLIENT_ID
  - name: NETATMO_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: netatmo-exporter-secret
        key: NETATMO_CLIENT_SECRET

configMaps:
  - name: netatmo-exporter-config
    data:
      NETATMO_EXPORTER_TOKEN_FILE: /config/netatmo-token.json
      NETATMO_EXPORTER_EXTERNAL_URL: https://netatmo-exporter.local.asztalos.net

# -----------------------------------------------------------------------------
# Secrets — ExternalSecret (onepassword-connect). OAuth client credentials as env
# keys + the seed token file (netatmo-token.json). NO secret material stored here.
# The {{ .* }} braces are the ExternalSecret's OWN (ESO) runtime templating,
# written raw because valueFiles are not Helm-processed.
# -----------------------------------------------------------------------------
externalSecrets:
  - name: netatmo-exporter-secret
    refreshInterval: 1h
    target:
      template:
        engineVersion: v2
        type: Opaque
        data:
          NETATMO_CLIENT_ID: "{{ .client_id }}"
          NETATMO_CLIENT_SECRET: "{{ .client_secret }}"
          netatmo-token.json: |
            {
              "access_token":"{{ .access_token }}",
              "refresh_token":"{{ .refresh_token }}",
              "expiry":"2025-07-30T10:50:59.589899665Z"}
            }
    data:
      - secretKey: client_id
        remoteRef:
          key: netatmo-exporter
          property: client_id
      - secretKey: client_secret
        remoteRef:
          key: netatmo-exporter
          property: client_secret
      - secretKey: access_token
        remoteRef:
          key: netatmo-exporter
          property: access_token
      - secretKey: refresh_token
        remoteRef:
          key: netatmo-exporter
          property: refresh_token

# -----------------------------------------------------------------------------
# Init container — seeds the token file from the secret into the config volume on
# first start (idempotent; skips if already present).
# -----------------------------------------------------------------------------
initContainers:
  - name: add-netatmo-token
    image: alpine:3.24
    imagePullPolicy: IfNotPresent
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      privileged: false
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    command:
      - sh
      - -c
      - |
        [ ! -s /config/netatmo-token.json ] && cp /secrets/netatmo-token.json /config/netatmo-token.json
        chmod 600 /config/netatmo-token.json
    volumeMounts:
      - name: netatmo-exporter-secret
        mountPath: /secrets/netatmo-token.json
        subPath: netatmo-token.json
      - name: config
        mountPath: /config

# -----------------------------------------------------------------------------
# Resources.
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# -----------------------------------------------------------------------------
# Probes — httpGet /metrics on :9210.
# -----------------------------------------------------------------------------
readinessProbe:
  httpGet:
    path: /metrics
    port: 9210
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 5
  successThreshold: 1
  timeoutSeconds: 10

livenessProbe:
  httpGet:
    path: /metrics
    port: 9210
  initialDelaySeconds: 30
  periodSeconds: 20
  failureThreshold: 5
  successThreshold: 1
  timeoutSeconds: 10

# -----------------------------------------------------------------------------
# Volumes / mounts. `config` comes from the volumeClaimTemplate; the secret is
# mounted for the init container to read.
# -----------------------------------------------------------------------------
volumeMounts:
  - name: config
    mountPath: /config

volumes:
  - name: netatmo-exporter-secret
    secret:
      secretName: netatmo-exporter-secret

# -----------------------------------------------------------------------------
# Sidecar containers (common >= 0.3.0) — a list appended AFTER the main container
# and passed through verbatim, the same contract as initContainers above.
# None here: this app is a single process.
#
# Used when a workload genuinely needs a co-process in the same pod — see
# charts/unbound, whose exporter reads the resolver's control socket over a
# shared emptyDir. Because the list is verbatim, a sidecar's image is a combined
# "repo:tag" string rather than the structured image.repository/image.tag; put a
# `# renovate:` comment on the line DIRECTLY above `image:` so the second
# customManager in renovate.json keeps it updated.
# -----------------------------------------------------------------------------
extraContainers: []

# -----------------------------------------------------------------------------
# Service(s) — list form (ClusterIP), targetPort by name.
# -----------------------------------------------------------------------------
services:
  - name: netatmo-exporter
    enabled: true
    type: ClusterIP
    ports:
      - name: http
        protocol: TCP
        port: 9210
        targetPort: http

# -----------------------------------------------------------------------------
# Traefik IngressRoute — one object with a `routes` list; real homelab hostname
# + TLS secret.
#
# Per-route options beyond host/port (common >= 0.4.0):
#   pathPrefix: /api   match becomes Host(`…`) && PathPrefix(`/api`); use
#                      `priority` to rank it above the catch-all host route.
#   middlewares: []    renders NO middlewares. OMIT the key to get the default
#                      authentik + default-headers pair. These are different:
#                      an empty list used to be indistinguishable from an absent
#                      key and silently got the defaults — see charts/apprise,
#                      whose machine-facing API routes must stay unauthenticated.
# -----------------------------------------------------------------------------
ingressRoute:
  enabled: true
  ingressClassName: traefik-external
  entryPoint: websecure
  tlsSecretName: local-asztalos-net-tls
  routes:
    - host: netatmo-exporter.local.asztalos.net
      serviceName: netatmo-exporter
      port: 9210
      priority: 10
      middlewares:
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik

# -----------------------------------------------------------------------------
# ServiceMonitor — this exporter IS scraped. `release: prometheus-operator` label
# preserved from the original (harmless; Prometheus discovers all ServiceMonitors
# regardless of label per the cluster config).
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  labels:
    release: prometheus-operator
  endpoints:
    - path: /metrics
      interval: 30s
      targetPort: http
      honorLabels: true

persistentVolumeClaims: []
persistentVolumes: []

extraLabels: {}
