---
# Secret path segment for the published .ics calendar feed (PLANNING §Calendar).
# The feed cannot sit behind Authentik (calendar clients can't do browser
# forward-auth), so the URL itself carries this unguessable token and the app
# verifies it. Anyone holding the URL can read customer names and prices —
# treat it like a password.
#
# 1Password: vault `kubernetes`, item `cake-pricing-app`, field `calendar_token`
#   generate with: openssl rand -hex 32
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cake-pricing-calendar-secret
  namespace: cake-pricing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: cake-pricing-calendar-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        calendar_token: "{{ .calendar_token }}"
  data:
    - secretKey: calendar_token
      remoteRef:
        key: cake-pricing-app
        property: calendar_token
