---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cake-pricing
  namespace: cake-pricing
  labels:
    app: cake-pricing
    app.kubernetes.io/name: cake-pricing
    app.kubernetes.io/part-of: cake-pricing
    app.kubernetes.io/instance: cake-pricing
    app.kubernetes.io/component: cake-pricing
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cake-pricing
  template:
    metadata:
      labels:
        app: cake-pricing
        app.kubernetes.io/name: cake-pricing
        app.kubernetes.io/part-of: cake-pricing
        app.kubernetes.io/instance: cake-pricing
        app.kubernetes.io/component: cake-pricing
    spec:
      containers:
        - name: cake-pricing
          # renovate: managed image tag — Renovate bumps this on new semver releases
          image: asztalosgyula/cake-pricing:1.7.0
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            privileged: false
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_ENV
              value: prod
            # DB connection: assembled from the CNPG-managed role secret.
            - name: DB_HOST
              value: postgres-rw.databases.svc.cluster.local
            - name: DB_NAME
              value: cake-pricing
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cake-pricing-postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cake-pricing-postgres-secret
                  key: password
            # Customer-intake API token (§8a) — shared with cake-order.
            - name: INTAKE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cake-pricing-intake-secret
                  key: intake_token
            # Secret path segment for the published .ics calendar feed.
            # Empty/absent disables the feed (the endpoint 404s).
            - name: CALENDAR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cake-pricing-calendar-secret
                  key: calendar_token
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 5
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 5
      restartPolicy: Always
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
