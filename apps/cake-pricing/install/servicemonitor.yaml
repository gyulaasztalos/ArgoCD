apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cake-pricing
  namespace: cake-pricing
  labels:
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cake-pricing
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      scheme: http
      honorLabels: true
  namespaceSelector:
    matchNames:
      - cake-pricing
