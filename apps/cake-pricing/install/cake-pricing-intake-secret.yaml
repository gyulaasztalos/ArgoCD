---
# Intake bearer token (§8a) — the SAME 1Password field cake-order uses
# (vault `kubernetes`, item `cake-order-app`, field `intake_token`), so the
# two apps can never drift apart.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cake-pricing-intake-secret
  namespace: cake-pricing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: cake-pricing-intake-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        intake_token: "{{ .intake_token }}"
  data:
    - secretKey: intake_token
      remoteRef:
        key: cake-order-app
        property: intake_token
