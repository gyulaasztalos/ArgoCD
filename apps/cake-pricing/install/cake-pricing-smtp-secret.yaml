---
# SMTP creds for the price-sync report e-mail. Reuses the SAME iCloud account
# cake-order sends with (1Password vault `kubernetes`, item `cake-order-app`,
# fields smtp_user / smtp_password), so the two apps can't drift.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cake-pricing-smtp-secret
  namespace: cake-pricing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: cake-pricing-smtp-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        smtp_user: "{{ .smtp_user }}"
        smtp_password: "{{ .smtp_password }}"
  data:
    - secretKey: smtp_user
      remoteRef:
        key: cake-order-app
        property: smtp_user
    - secretKey: smtp_password
      remoteRef:
        key: cake-order-app
        property: smtp_password
