apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cake-pricing-alerts
  namespace: cake-pricing
spec:
  groups:
    - name: cake-pricing.rules
      rules:
        - alert: cake-pricing-down
          expr: absent(up{job="cake-pricing"} == 1)
          for: 5m
          labels:
            severity: critical
            namespace: cake-pricing
            app: cake-pricing
          annotations:
            summary: "cake-pricing service is down"
            description: "The cake-pricing service has not been up for the last 5 minutes."
        - alert: cake-pricing-restart-loop
          expr: increase(kube_pod_container_status_restarts_total{namespace="cake-pricing", pod=~"cake-pricing-.*"}[18m]) > 3
          for: 1m
          labels:
            severity: warning
            namespace: cake-pricing
            app: cake-pricing
          annotations:
            summary: "cake-pricing pod is restarting frequently"
            description: "The cake-pricing pod has restarted more than 3 times in the last 18 minutes."
        # Daily price-sync CronJob failed (download / parse / DB / e-mail).
        - alert: cake-pricing-price-sync-failed
          expr: kube_job_status_failed{namespace="cake-pricing", job_name=~"cake-pricing-price-sync-.*"} > 0
          for: 1m
          labels:
            severity: warning
            namespace: cake-pricing
            app: cake-pricing
          annotations:
            summary: "cake-pricing price-sync job failed"
            description: "The daily price-sync CronJob failed. Check its pod logs; component prices were not updated."
        # No successful price-sync run in over 25 hours (the daily job at 08:00
        # should refresh this well within a day). Catches a job that never runs.
        - alert: cake-pricing-price-sync-stale
          expr: time() - cake_pricing_price_sync_last_success_timestamp_seconds > 90000
          for: 30m
          labels:
            severity: warning
            namespace: cake-pricing
            app: cake-pricing
          annotations:
            summary: "cake-pricing price-sync is stale"
            description: "No successful price-sync run in over 25 hours (last success > 25h ago)."
        # Safety net for the staleness gauge itself. The app emits NO sample when
        # it can't read the DB (a 0 would false-page the stale rule above), so a
        # long absence must be caught separately — otherwise "app up but DB
        # unreadable" (or a deleted state row) would silently disable staleness
        # detection. absent_over_time(1h) + for:30m ignores a brief scrape blip.
        - alert: cake-pricing-price-sync-metric-missing
          expr: absent_over_time(cake_pricing_price_sync_last_success_timestamp_seconds[1h])
          for: 30m
          labels:
            severity: warning
            namespace: cake-pricing
            app: cake-pricing
          annotations:
            summary: "cake-pricing price-sync freshness metric is missing"
            description: "The price-sync last-success metric has been absent for over an hour — the app can't read the DB at scrape time, or the price_sync_state row is gone. Staleness can't be evaluated until it returns."
