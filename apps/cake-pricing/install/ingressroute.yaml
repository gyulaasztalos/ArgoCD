---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cake-pricing
  namespace: cake-pricing
  labels:
    app: cake-pricing
    app.kubernetes.io/name: cake-pricing
    app.kubernetes.io/part-of: cake-pricing
    app.kubernetes.io/instance: cake-pricing
    app.kubernetes.io/component: cake-pricing
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`torta.local.asztalos.net`)
      priority: 10
      middlewares:
        # Authentication is handled entirely at the ingress (no in-app auth).
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik
      services:
        - name: cake-pricing
          namespace: cake-pricing
          port: 80
  tls:
    secretName: local-asztalos-net-tls
