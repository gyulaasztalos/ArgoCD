---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cake-pricing
  namespace: cake-pricing
  labels:
    app: cake-pricing
    app.kubernetes.io/name: cake-pricing
    app.kubernetes.io/part-of: cake-pricing
    app.kubernetes.io/instance: cake-pricing
    app.kubernetes.io/component: cake-pricing
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
    # Published .ics calendar feed. Calendar apps (Apple Calendar et al.) cannot
    # complete Authentik's browser forward-auth, so this prefix deliberately
    # SKIPS the authentik middleware and keeps only default-headers.
    # It is not unprotected: the path embeds an unguessable CALENDAR_TOKEN that
    # the app verifies, and anything else under /calendar/ returns 404
    # ("machines use tokens, humans use Authentik" — PLANNING §Calendar).
    # Higher priority than the catch-all rule below so it wins the match.
    - kind: Rule
      match: Host(`torta.local.asztalos.net`) && PathPrefix(`/calendar/`)
      priority: 20
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: cake-pricing
          namespace: cake-pricing
          port: 80
    - kind: Rule
      match: Host(`torta.local.asztalos.net`)
      priority: 10
      middlewares:
        # Authentication is handled entirely at the ingress (no in-app auth).
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik
      services:
        - name: cake-pricing
          namespace: cake-pricing
          port: 80
  tls:
    secretName: local-asztalos-net-tls
