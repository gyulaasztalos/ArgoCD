apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: influxdb
  namespace: influxdb
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: influxdb
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      # Cardinality control (rPi-friendly): InfluxDB templates the `path` label of the
      # http_api_request_duration_seconds histogram across every UI static asset
      # (/:file_name.js, .png, .wasm, .woff2, /:fallback_path, per-hash images…), each a
      # full 12-bucket histogram × user_agent. None of it is useful for monitoring, and it
      # would balloon series count. Drop those series at scrape time. Metrics without a
      # `path` label (go_*, boltdb_*, …) have path="" and are unaffected. The kept /api/v2/*
      # paths are bounded and are exactly what the alert rules query.
      metricRelabelings:
        - sourceLabels: [path]
          regex: '/(:.*|[0-9a-f]+\.\..*|.*\.(js|css|svg|png|wasm|woff2|ico|map|html|txt))'
          action: drop
