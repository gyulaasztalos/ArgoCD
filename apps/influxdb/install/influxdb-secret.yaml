---
# Initial admin credentials + token for InfluxDB 2.x automated setup.
# Populate the 1Password item "influxdb" with: username, password, admin-token
# (generate a strong random token, e.g. `openssl rand -hex 32`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: influxdb-init
  namespace: influxdb
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: influxdb-init
    creationPolicy: Owner
  data:
    - secretKey: admin-username
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: influxdb
        metadataPolicy: None
        property: username
    - secretKey: admin-password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: influxdb
        metadataPolicy: None
        property: password
    - secretKey: admin-token
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: influxdb
        metadataPolicy: None
        property: admin-token
