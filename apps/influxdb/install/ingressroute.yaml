---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: influxdb
  namespace: influxdb
  labels:
    app: influxdb
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: influxdb
    app.kubernetes.io/instance: influxdb
    app.kubernetes.io/component: influxdb
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`influxdb.local.asztalos.net`) && PathPrefix(`/api`)
      priority: 20  # Higher than your main route
      services:
        - name: influxdb
          namespace: influxdb
          port: 8086
    - match: Host(`influxdb.local.asztalos.net`)
      kind: Rule
      middlewares:
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik
      services:
        - name: influxdb
          namespace: influxdb
          port: 8086
  tls:
    secretName: local-asztalos-net-tls
