---
# Grafana datasource for InfluxDB 2.x (Flux — the native v2 query language; no DBRP/v1
# compatibility mapping needed). Rendered as a labeled Secret so the Grafana datasources
# sidecar auto-discovers it (requires sidecar.datasources.searchNamespace: ALL in
# monitoring/values.yaml).
#
# Reuses the same admin token created at first-boot setup (1Password item "influxdb",
# property "admin-token") — one token, one source of truth.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: influxdb-grafana-datasource
  namespace: influxdb
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: influxdb-grafana-datasource
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          grafana_datasource: "1"
      data:
        influxdb.yaml: |
          apiVersion: 1
          datasources:
            - name: InfluxDB
              uid: influxdb
              type: influxdb
              access: proxy
              # in-cluster service — no ingress/TLS hop needed
              url: http://influxdb.influxdb.svc.cluster.local:8086
              jsonData:
                version: Flux
                organization: homelab
                defaultBucket: homeassistant
              secureJsonData:
                token: "{{ .credential }}"
              editable: false
  data:
    - secretKey: credential
      remoteRef:
        key: influxdb
        property: admin-token
