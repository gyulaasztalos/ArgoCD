---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  namespace: influxdb
  labels:
    app: influxdb
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: influxdb
    app.kubernetes.io/instance: influxdb
    app.kubernetes.io/component: influxdb
spec:
  replicas: 1
  serviceName: influxdb
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb
  template:
    metadata:
      labels:
        app: influxdb
        app.kubernetes.io/name: influxdb
        app.kubernetes.io/part-of: influxdb
        app.kubernetes.io/instance: influxdb
        app.kubernetes.io/component: influxdb
    spec:
      containers:
        - name: influxdb
          # Official InfluxDB 2.x OSS — multi-arch (linux/arm64 for rPi 5), MIT/Apache.
          # Renovate will propose bumps. Pin the minor; avoid bare ":2" drifting majors.
          image: "influxdb:2.7"
          imagePullPolicy: IfNotPresent
          # On first boot, DOCKER_INFLUXDB_INIT_MODE=setup auto-creates the org, the bucket
          # (with retention), and the admin user + token. No manual bootstrap needed.
          # On subsequent boots the entrypoint detects existing data and skips setup.
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: "setup"
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: "homelab"
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: "homeassistant"
            # 45-day retention on THIS bucket only (HACCP window + buffer). Format: <n>d/w/h, 0 = infinite.
            - name: DOCKER_INFLUXDB_INIT_RETENTION
              value: "45d"
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: admin-username
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: admin-password
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: admin-token
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          ports:
            - containerPort: 8086
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 10
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
      restartPolicy: Always
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        # The influxdb user in the official image is uid/gid 1000. fsGroup makes the
        # Longhorn volumes group-writable so the non-root process can persist data.
        fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: influxdb-data
        labels:
          app: influxdb
          app.kubernetes.io/name: influxdb
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
