---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - influxdb-secret.yaml
  - statefulset.yaml
  - service.yaml
  - ingressroute.yaml
  - grafana-datasource.yaml
  - servicemonitor.yaml
  - prometheus-rules.yaml
  - haccp-backup-alert-job.yaml

configMapGenerator:
  - name: influxdb-fridge-haccp-dashboard
    namespace: influxdb
    files:
      - fridge-haccp-dashboard.json=fridge-haccp-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "/tmp/dashboards/HomeAssistant"
  - name: influxdb-oss-metrics-dashboard
    namespace: influxdb
    files:
      - influxdb-oss-metrics-dashboard.json=influxdb-oss-metrics-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "/tmp/dashboards/HomeAssistant"
  - name: influxdb-haccp-alert-template
    namespace: influxdb
    files:
      - haccp-backup-alert-template.yml=haccp-backup-alert-template.yml
    options:
      labels:
        app.kubernetes.io/component: haccp-alert-apply

generatorOptions:
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/instance: influxdb
    app.kubernetes.io/part-of: influxdb
    app.kubernetes.io/component: influxdb
